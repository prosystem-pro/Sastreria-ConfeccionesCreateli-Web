<!-- BOTONES -->
<div class="barra-acciones no-print">

  <button class="btn imprimir" (click)="imprimir()">
    🖨️ Imprimir
  </button>

  <button class="btn cerrar" (click)="cerrar()">
    ✖ Cerrar
  </button>

</div>

<!-- Spinner -->
<div *ngIf="Procesando" style="text-align:center; margin-top:20px;">
  Cargando factura...
</div>

<!-- TICKET -->
<div *ngIf="datosImpresion"
     id="ticket-impresion"
     style="
        font-family: monospace;
        font-size:18px;
        line-height:2.2;
        width:576px;
        margin:0 auto;
        padding:22px;
     ">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:25px;">
    <img
      src="LogoConfeccionesCreateli.png"
      alt="logo"
      style="width:30%; height:auto; display:block; margin:0 auto;">
  </div>

  <!-- EMPRESA -->
  <div style="text-align:center; font-weight:bold; font-size:22px; margin-bottom:6px;">
    {{ datosImpresion.empresa.nombre }}
  </div>

  <div style="text-align:center; margin-bottom:4px;">
    NIT: {{ datosImpresion.empresa.nit }}
  </div>

  <div style="text-align:center; margin-bottom:4px;">
    {{ datosImpresion.empresa.direccion }}
  </div>

  <div style="text-align:center;">
    Tel: {{ datosImpresion.empresa.telefono }}
  </div>

  <hr style="border-style:dotted; margin:25px 0;">

  <!-- CLIENTE -->
  <!-- (todo tu contenido sigue igual) -->

  <div style="text-align:center; font-size:18px;">
    Gracias por su compra
  </div>

</div>
